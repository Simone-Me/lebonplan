<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Urban Data Explorer — Paris</title>
  <link href="https://unpkg.com/maplibre-gl@4/dist/maplibre-gl.css" rel="stylesheet" />
  <link rel="stylesheet" href="/src/style.css" />
</head>
<body>
  <div id="app">

    <div id="main-row">

      <!-- Carte 70% -->
      <div id="map-container">
        <div id="map"></div>
      </div>

      <!-- Panneau droit 30% -->
      <div id="right-panel">

        <div class="panel-header">
          <span class="logo">UD</span>
          <span class="app-title">Urban Data Explorer</span>
        </div>

        <div class="panel-section">
          <label class="panel-label">Indicateur</label>
          <select id="indicateur-select">
            <option value="score_global">Score global</option>
            <option value="score_qualite_vie">Qualité de vie</option>
            <option value="score_transports">Transports</option>
            <option value="score_loisirs">Loisirs</option>
            <option value="score_services">Services publics</option>
            <option value="prix_m2_median">Prix m² médian</option>
            <option value="pct_logements_sociaux">% Logements sociaux</option>
          </select>
        </div>

        <div class="panel-section">
          <p class="panel-help">
            La carte principale est agrégée par <strong>quartier administratif</strong> :
            80 polygones, plus précis que l’arrondissement. La comparaison ci-dessous reste au niveau arrondissement.
          </p>
        </div>

        <div class="panel-section">
          <label class="panel-label">Année : <strong id="annee-label">2026</strong></label>
          <input type="range" id="annee-slider" min="2014" max="2026" value="2026" step="1" />
          <div class="slider-ticks"><span>2014</span><span>2026</span></div>
        </div>

        <div class="panel-section">
          <button id="compare-btn" class="btn-primary full-width">⇄ Comparer 2 arrondissements</button>
        </div>

        <div class="panel-section">
          <label class="panel-label">Adresse</label>
          <input id="geocode-input" type="text" placeholder="Chercher une adresse à Paris…" autocomplete="off" />
          <ul id="geocode-results" class="autocomplete-list hidden"></ul>
        </div>

        <div id="sidebar-content"></div>

      </div><!-- /right-panel -->

    </div><!-- /main-row -->

    <!-- Légende en bas -->
    <div id="legend-bar">
      <span class="legend-label" id="legend-title">Score global</span>
      <span class="legend-min">0</span>
      <div class="legend-gradient" id="legend-gradient"></div>
      <span class="legend-max">100</span>
    </div>

  </div><!-- /app -->

  <!-- Panel comparaison (overlay centré) -->
  <div id="compare-panel" class="compare-panel hidden">
    <button id="compare-close" class="btn-icon">✕</button>
    <h2>Comparer deux arrondissements</h2>
    <div class="compare-selects">
      <select id="compare-arr1"></select>
      <span>vs</span>
      <select id="compare-arr2"></select>
      <button id="compare-go" class="btn-primary">Comparer</button>
    </div>
    <div id="compare-radar-container">
      <canvas id="compare-radar"></canvas>
    </div>
    <div id="compare-table"></div>
  </div>

  <script type="module" src="/src/main.js"></script>
</body>
</html>
