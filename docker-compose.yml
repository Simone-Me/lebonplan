# docker-compose.yml
services:

  minio:
    image: minio/minio
    ports:
      - "9000:9000"   # API S3
      - "9001:9001"   # Console web
    environment:
      MINIO_ROOT_USER: admin
      MINIO_ROOT_PASSWORD: password123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  mongodb:
    image: mongo:7
    ports:
      - "27017:27017"
    volumes:
      - mongo_data:/data/db

  postgres:
    image: postgis/postgis:16-3.4
    ports:
      - "5432:5432"
    environment:
      POSTGRES_DB: urban_data
      POSTGRES_USER: admin
      POSTGRES_PASSWORD: password123
    volumes:
      - pg_data:/var/lib/postgresql/data

volumes:
  minio_data:
  mongo_data:
  pg_data: